<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#FFDD57"/>
      <stop offset="55%" stop-color="#FFC629"/>
      <stop offset="100%" stop-color="#F0A400"/>
    </radialGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#232326"/>
      <stop offset="100%" stop-color="#151517"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE79A"/>
      <stop offset="100%" stop-color="#FFC629"/>
    </linearGradient>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="none" stroke="#B8790A" stroke-opacity="0.18" stroke-width="6"/>

  <!-- open book silhouette -->
  <path d="
    M 300 780
    C 280 780 264 764 264 744
    L 264 372
    C 264 358 273 346 287 342
    C 340 326 400 322 446 356
    C 470 374 490 398 502 420
    L 502 744
    C 502 764 486 780 466 780
    Z
  " fill="url(#book)"/>
  <path d="
    M 724 780
    C 744 780 760 764 760 744
    L 760 372
    C 760 358 751 346 737 342
    C 684 326 624 322 578 356
    C 554 374 534 398 522 420
    L 522 744
    C 522 764 538 780 558 780
    Z
  " fill="url(#book)"/>

  <!-- spine shadow -->
  <path d="M 502 420 C 508 408 516 400 512 396 C 508 400 516 408 522 420 L 522 744 C 522 754 516 762 512 766 C 508 762 502 754 502 744 Z" fill="#0D0D0E" opacity="0.55"/>

  <!-- novel/article text lines on left page -->
  <g stroke="#FFE79A" stroke-width="12" stroke-linecap="round" opacity="0.92">
    <line x1="308" y1="430" x2="452" y2="430"/>
    <line x1="308" y1="478" x2="452" y2="478"/>
    <line x1="308" y1="526" x2="452" y2="526"/>
    <line x1="308" y1="574" x2="420" y2="574"/>
  </g>

  <!-- manga panel grid on right page -->
  <g fill="none" stroke="#FFE79A" stroke-width="12" opacity="0.92">
    <rect x="546" y="420" width="200" height="120" rx="6"/>
    <rect x="546" y="556" width="94" height="150" rx="6"/>
    <rect x="654" y="556" width="92" height="150" rx="6"/>
  </g>

  <!-- bookmark ribbon draped over spine -->
  <path d="M 470 200 L 554 200 L 554 470 L 512 428 L 470 470 Z" fill="url(#ribbon)"/>
</svg>
